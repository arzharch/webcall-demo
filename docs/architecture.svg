<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" width="100%" height="100%">
  <!-- Background -->
  <rect width="1000" height="650" fill="#f8f9fa" rx="10"/>

  <!-- Title -->
  <text x="500" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#343a40">Bella Cucina - System Architecture</text>

  <!-- Definitions -->
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6c757d"/>
    </marker>
  </defs>

  <!-- User / Frontend -->
  <rect x="50" y="250" width="160" height="80" rx="8" fill="#e3f2fd" stroke="#2196f3" stroke-width="2" filter="url(#shadow)"/>
  <text x="130" y="290" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#0d47a1">User / Browser</text>
  <text x="130" y="315" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#1565c0">(Next.js Frontend)</text>

  <!-- Connection: User to API -->
  <line x1="210" y1="290" x2="310" y2="290" stroke="#6c757d" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <text x="260" y="280" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#495057">WebSocket</text>

  <!-- API Layer (The Mediator) -->
  <rect x="320" y="190" width="200" height="200" rx="8" fill="#e8f5e9" stroke="#4caf50" stroke-width="2" filter="url(#shadow)"/>
  <text x="420" y="220" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#1b5e20">API Layer (FastAPI)</text>
  
  <rect x="340" y="240" width="160" height="35" rx="4" fill="#c8e6c9" stroke="#81c784" stroke-width="1"/>
  <text x="420" y="262" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#1b5e20">Session Manager</text>

  <rect x="340" y="285" width="160" height="35" rx="4" fill="#c8e6c9" stroke="#81c784" stroke-width="1"/>
  <text x="420" y="307" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#1b5e20">Audio Transport</text>

  <rect x="340" y="330" width="160" height="35" rx="4" fill="#c8e6c9" stroke="#81c784" stroke-width="1"/>
  <text x="420" y="352" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#1b5e20">Rate Limiter</text>

  <!-- Speech Services (Top) -->
  <rect x="250" y="70" width="340" height="80" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="2" filter="url(#shadow)"/>
  <text x="420" y="95" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#e65100">Speech Pipeline</text>
  <text x="330" y="125" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#ef6c00">Deepgram STT (VAD)</text>
  <text x="510" y="125" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#ef6c00">Google Cloud TTS</text>

  <!-- Connection: API to Speech -->
  <line x1="420" y1="190" x2="420" y2="150" stroke="#6c757d" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <text x="490" y="175" font-family="Arial, sans-serif" font-size="12" fill="#495057">Audio Chunks</text>

  <!-- Connection: API to Brain -->
  <line x1="520" y1="290" x2="620" y2="290" stroke="#6c757d" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <text x="570" y="280" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#495057">Text / State</text>

  <!-- Brain Layer -->
  <rect x="630" y="190" width="200" height="200" rx="8" fill="#f3e5f5" stroke="#9c27b0" stroke-width="2" filter="url(#shadow)"/>
  <text x="730" y="220" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#4a148c">The "Brain"</text>
  <text x="730" y="240" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#6a1b9a">(LangChain Orchestrator)</text>
  
  <rect x="650" y="260" width="160" height="35" rx="4" fill="#e1bee7" stroke="#ba68c8" stroke-width="1"/>
  <text x="730" y="282" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#4a148c">LCEL Router</text>

  <rect x="650" y="305" width="160" height="35" rx="4" fill="#e1bee7" stroke="#ba68c8" stroke-width="1"/>
  <text x="730" y="327" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#4a148c">Agentic Tools</text>

  <!-- Connection: Brain to LLM -->
  <line x1="730" y1="190" x2="730" y2="150" stroke="#6c757d" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <text x="740" y="175" font-family="Arial, sans-serif" font-size="12" fill="#495057">Prompts / Streams</text>

  <!-- LLM (Top Right) -->
  <rect x="630" y="70" width="200" height="80" rx="8" fill="#fce4ec" stroke="#e91e63" stroke-width="2" filter="url(#shadow)"/>
  <text x="730" y="105" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#880e4f">LLM Engine</text>
  <text x="730" y="130" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#ad1457">Google Gemini 2.0 Flash</text>

  <!-- Connection: Brain to Data -->
  <line x1="730" y1="390" x2="730" y2="430" stroke="#6c757d" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <text x="740" y="415" font-family="Arial, sans-serif" font-size="12" fill="#495057">Queries</text>

  <!-- Data Sources (Bottom Right) -->
  <rect x="630" y="440" width="200" height="120" rx="8" fill="#e0f7fa" stroke="#00bcd4" stroke-width="2" filter="url(#shadow)"/>
  <text x="730" y="470" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#006064">Data Sources</text>
  
  <rect x="650" y="490" width="160" height="25" rx="4" fill="#b2ebf2" stroke="#4dd0e1" stroke-width="1"/>
  <text x="730" y="507" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#006064">FAISS (Menu &amp; FAQs)</text>

  <rect x="650" y="525" width="160" height="25" rx="4" fill="#b2ebf2" stroke="#4dd0e1" stroke-width="1"/>
  <text x="730" y="542" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#006064">SQLite (Bookings)</text>

  <!-- Infra Layer (Bottom Left) -->
  <rect x="150" y="440" width="400" height="120" rx="8" fill="#eceff1" stroke="#607d8b" stroke-width="2" filter="url(#shadow)"/>
  <text x="350" y="470" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="#263238">Infra &amp; Observability</text>
  
  <rect x="170" y="490" width="160" height="25" rx="4" fill="#cfd8dc" stroke="#90a4ae" stroke-width="1"/>
  <text x="250" y="507" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#37474f">OpenTelemetry Tracing</text>

  <rect x="170" y="525" width="160" height="25" rx="4" fill="#cfd8dc" stroke="#90a4ae" stroke-width="1"/>
  <text x="250" y="542" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#37474f">Token / Cost Tracker</text>

  <rect x="370" y="490" width="160" height="25" rx="4" fill="#cfd8dc" stroke="#90a4ae" stroke-width="1"/>
  <text x="450" y="507" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#37474f">Redis (Caching/Sessions)</text>

  <rect x="370" y="525" width="160" height="25" rx="4" fill="#cfd8dc" stroke="#90a4ae" stroke-width="1"/>
  <text x="450" y="542" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#37474f">Circuit Breakers</text>

</svg>
