<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" width="100%" height="100%">
  <!-- Background -->
  <rect width="1000" height="700" fill="#f8f9fa" rx="10"/>

  <!-- Title -->
  <text x="500" y="30" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle" fill="#343a40">Bella Cucina - Request Lifecycle &amp; Streaming Flow</text>

  <!-- Definitions -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#343a40"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1565c0"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6a1b9a"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e65100"/>
    </marker>
    <marker id="arrow-pink" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ad1457"/>
    </marker>
  </defs>

  <!-- Swimlane Headers -->
  <rect x="50" y="70" width="120" height="40" rx="4" fill="#e3f2fd" stroke="#2196f3"/>
  <text x="110" y="95" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#0d47a1">User / Browser</text>

  <rect x="230" y="70" width="120" height="40" rx="4" fill="#e8f5e9" stroke="#4caf50"/>
  <text x="290" y="95" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1b5e20">API Layer</text>

  <rect x="410" y="70" width="120" height="40" rx="4" fill="#fff3e0" stroke="#ff9800"/>
  <text x="470" y="95" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#e65100">Deepgram STT</text>

  <rect x="590" y="70" width="120" height="40" rx="4" fill="#f3e5f5" stroke="#9c27b0"/>
  <text x="650" y="95" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#4a148c">Brain (LangChain)</text>

  <rect x="770" y="70" width="120" height="40" rx="4" fill="#fce4ec" stroke="#e91e63"/>
  <text x="830" y="95" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#880e4f">LLM (Gemini)</text>

  <rect x="410" y="600" width="120" height="40" rx="4" fill="#fff3e0" stroke="#ff9800"/>
  <text x="470" y="625" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#e65100">Google Cloud TTS</text>

  <!-- Vertical Lifelines -->
  <line x1="110" y1="110" x2="110" y2="650" stroke="#adb5bd" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="290" y1="110" x2="290" y2="650" stroke="#adb5bd" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="470" y1="110" x2="470" y2="300" stroke="#adb5bd" stroke-width="1" stroke-dasharray="5,5"/> <!-- STT lifeline -->
  <line x1="650" y1="110" x2="650" y2="650" stroke="#adb5bd" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="830" y1="110" x2="830" y2="500" stroke="#adb5bd" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="470" y1="500" x2="470" y2="600" stroke="#adb5bd" stroke-width="1" stroke-dasharray="5,5"/> <!-- TTS lifeline -->

  <!-- Sequence Actions -->
  
  <!-- 1. Audio In -->
  <line x1="110" y1="140" x2="290" y2="140" stroke="#1565c0" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="200" y="130" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#1565c0">User speaks (Audio Chunk)</text>

  <line x1="290" y1="160" x2="470" y2="160" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="380" y="150" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2e7d32">Forward Audio Stream</text>

  <!-- 2. VAD & Text Out -->
  <line x1="470" y1="200" x2="290" y2="200" stroke="#e65100" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="380" y="190" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#e65100">Final Transcript (Text)</text>

  <!-- 3. Text to Brain -->
  <line x1="290" y1="230" x2="650" y2="230" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="470" y="220" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2e7d32">User Input (Text)</text>

  <!-- 4. Brain processing and Tool Calling (loop self) -->
  <rect x="640" y="250" width="20" height="40" fill="#e1bee7" stroke="#ba68c8"/>
  <path d="M 660 260 C 690 260, 690 280, 660 280" fill="none" stroke="#6a1b9a" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <text x="735" y="275" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#6a1b9a">LCEL Routing &amp; RAG Tools</text>

  <!-- 5. Prompt to LLM -->
  <line x1="650" y1="310" x2="830" y2="310" stroke="#6a1b9a" stroke-width="2" marker-end="url(#arrow-purple)"/>
  <text x="740" y="300" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#6a1b9a">Structured Prompt</text>

  <!-- 6. LLM Stream to Brain -->
  <line x1="830" y1="350" x2="650" y2="350" stroke="#ad1457" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow-pink)"/>
  <line x1="830" y1="370" x2="650" y2="370" stroke="#ad1457" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow-pink)"/>
  <text x="740" y="340" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#ad1457">Stream Text Chunks</text>

  <!-- 7. Brain Stream to API -->
  <line x1="650" y1="400" x2="290" y2="400" stroke="#6a1b9a" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow-purple)"/>
  <line x1="650" y1="420" x2="290" y2="420" stroke="#6a1b9a" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#arrow-purple)"/>
  <text x="470" y="390" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#6a1b9a">Yield Sentences</text>

  <!-- 8. API to TTS -->
  <line x1="290" y1="450" x2="470" y2="450" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="380" y="440" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2e7d32">Send Sentence (Text)</text>

  <rect x="460" y="465" width="20" height="20" fill="#fff3e0" stroke="#ff9800"/>
  <text x="540" y="480" font-family="Arial, sans-serif" font-size="11" text-anchor="middle" fill="#e65100">(Check Redis Cache)</text>

  <!-- 9. TTS Audio to API -->
  <line x1="470" y1="510" x2="290" y2="510" stroke="#e65100" stroke-width="2" marker-end="url(#arrow-orange)"/>
  <text x="380" y="500" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#e65100">Audio Payload (Bytes)</text>

  <!-- 10. API Audio to User -->
  <line x1="290" y1="540" x2="110" y2="540" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="200" y="530" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#2e7d32">WebSocket Audio Chunk</text>

  <!-- 11. User hears -->
  <rect x="80" y="560" width="60" height="30" rx="4" fill="#bbdefb" stroke="#1976d2"/>
  <text x="110" y="580" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#0d47a1">Hears</text>

</svg>
